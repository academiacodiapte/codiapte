<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Informació oficial · Acadèmia Codi APTE</title>

  <style>
    :root{
      --bg:#0b1220;
      --panel: rgba(15, 26, 48, 0.72);
      --line: rgba(148,163,184,0.18);
      --text:#ffffff;
      --muted: rgba(203,213,225,0.92);
      --btn:#1e3a8a;
      --btnHover:#2747a8;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap{
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 20px;
    }
    .card{
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35);
    }
    h1{ margin:0 0 8px; font-size: 34px; letter-spacing: .5px; }
    p{ margin:0 0 16px; color: var(--muted); line-height:1.55; }
    .btn{
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 16px;
      border-radius: 12px;
      background: var(--btn);
      border: 1px solid rgba(255,255,255,0.16);
      color: var(--text);
      text-decoration: none;
      font-weight: 800;
      letter-spacing: .5px;
      text-transform: uppercase;
    }
    .btn:hover{ background: var(--btnHover); }
    ul{ margin: 0; padding-left: 18px; color: var(--muted); }
    li{ margin: 10px 0; }
  </style>
</head>

<body>
  <div class="wrap">
    <a class="btn" href="./mossos.html">← Tornar</a>

    <div style="height:14px"></div>

    <div class="card">
      <h1>Informació oficial</h1>
      <p>Aquí posarem enllaços oficials i recursos útils per a l’oposició.</p>

      <ul>
        <li>Convocatòries i bases (enllaç oficial)</li>
        <li>Temari oficial (enllaç oficial)</li>
        <li>Requisits i proves (enllaç oficial)</li>
      </ul>
    </div>
  </div>
</body>
</html>
